name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13']
    continue-on-error: ${{ matrix.python-version != '3.11' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dev dependencies
        run: |
          uv pip install --system -e ".[dev]"
          uv pip install --system ruff pyright
          mkdir -p .venv/bin
          ln -sf $(which python3) .venv/bin/python

      - name: Run verify
        run: |
          export PYTHONPATH=src
          make verify

      - name: Verify Docs Build
        run: |
          export PYTHONPATH=src
          NO_MKDOCS_2_WARNING=1 mkdocs build --strict

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm install

      - name: Run frontend tests
        run: cd frontend && npm run test

      - name: Run lint
        run: cd frontend && npm run lint

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: uv pip install --system pip-audit bandit

      - name: Run pip-audit
        run: pip-audit || true

      - name: Run bandit
        run: bandit -r src/ -f json || true

  stress-test:
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.12', '3.13']
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        run: uv pip install --system pytest pytest-timeout

      - name: Run 30x stress loop
        run: |
          export PYTHONPATH=src
          for i in $(seq 1 30); do
            echo "=== Iteration $i / 30 (Python ${{ matrix.python-version }}) ==="
            if ! timeout 60 pytest tests/test_integration.py::test_agent_session_persistence -x -q 2>&1; then
              echo "SEGFAULT on iteration $i"
              exit 1
            fi
          done
          echo "All 30 iterations passed"

  nix-flake:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v16

      - name: Check flake
        run: nix flake check --no-build

      - name: Build backend
        run: nix build .#backend

      - name: Build frontend
        run: nix build .#frontend

      - name: Build fullstack
        run: nix build .
