repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml

  - repo: local
    hooks:
      - id: ruff
        name: ruff
        entry: nix develop --command ruff check --fix src/ tests/
        language: system
        types: [python]
        pass_filenames: false

  - repo: local
    hooks:
      - id: pyright
        name: pyright
        entry: nix develop --command pyright --pythonpath .venv/bin/python src/
        language: system
        types: [python]
        pass_filenames: false

  - repo: local
    hooks:
      - id: frontend-lint
        name: frontend-lint
        entry: nix develop --command bash -c 'cd frontend && npm run lint'
        language: system
        files: ^frontend/
        types: [ts, tsx]

  - repo: local
    hooks:
      - id: frontend-test
        name: frontend-test
        entry: nix develop --command bash -c 'cd frontend && npm run test'
        language: system
        files: ^frontend/
        types: [ts, tsx]

  - repo: local
    hooks:
      - id: prettier
        name: prettier
        entry: nix develop --command bash -c 'cd frontend && npx prettier --write .'
        language: system
        files: ^frontend/

  - repo: local
    hooks:
      - id: mkdocs
        name: mkdocs-build
        entry: nix develop --command bash
        args: ["-c", "export PYTHONPATH=src && uv run mkdocs build"]
        language: system
        files: ^docs/|mkdocs\.yml|pyproject\.toml
        pass_filenames: false
