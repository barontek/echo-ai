repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.3.0
    hooks:
      - id: ruff
        args: [ --fix ]

  - repo: local
    hooks:
      - id: pyright
        name: pyright
        entry: uv run pyright src/
        language: system
        types: [python]
        pass_filenames: false

  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v9.0.0
    hooks:
      - id: eslint
        entry: npm run lint --prefix frontend
        language: system
        files: \.(js|ts|tsx)$
        pass_filenames: false

  - repo: https://github.com/prettier/pre-commit
    rev: v3.0.0
    hooks:
      - id: prettier
        entry: npx prettier --write --prefix frontend
        language: system
        files: \.(js|ts|tsx|css)$
        pass_filenames: false
