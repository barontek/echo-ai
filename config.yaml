model:
  # provider options: anthropic, openai, ollama
  provider: ollama
  name: qwen3:4b  # or codellama, mistral, etc.
  # For ollama, optionally specify base_url (default: http://localhost:11434)
  base_url: http://localhost:11434
  temperature: 0.3

tools:
  enabled:
    - bash
    - read_file
    - write_file
    - list_dir
    - glob
    - grep
    - web_fetch
    - web_search
    - git
    - memory
  bash:
    allowed_commands:
      - git
      - npm
      - cargo
      - make
      - ls
      - cat
      - echo
      - grep
      - find
      - python
      - python3
      - node
    timeout: 60

safety:
  workspace: "/home/barontek"
  allow_network: true
  allowed_domains: []
  blocked_commands:
    - "rm -rf /"
    - "dd if="
    - "mkfs"
    - ":(){:|:&};:"
    - "curl.*|.*sh"
    - "wget.*|.*sh"
    - "nc -e"
    - "/bin/sh -i"
    - "/bin/bash -i"
  max_file_size: 10485760
  max_execution_time: 60
  require_approval_for:
    - bash
    - write_file

agent:
  max_iterations: 50
  max_context_messages: 50  # Max messages to keep in context (0 = unlimited)
  max_context_chars: 100000  # Max characters in context (0 = unlimited)
  
  # Sub-agents configuration
  sub_agents:
    coder:
      description: "Expert programmer for code tasks"
      model: "qwen3:4b"
      tools: ["read_file", "write_file", "glob", "grep", "list_dir"]
    researcher:
      description: "Research assistant for web searches"
      tools: ["web_search", "web_fetch"]
  
  system_prompt: |
    You are a friendly AI assistant. Keep responses brief.
    
    When someone says hi/hello, just say hi back warmly!
    
    IMPORTANT: You fully support UTF-8. Handle all Unicode characters including Turkish (ş, ç, ı, ö, ü, ğ), German (ü, ö, ä), etc. correctly in city names and URLs.
    
    Tools:
    - list_dir(path=".") for listing files
    - read_file(path="...") for reading files  
    - web_fetch(url="...") to fetch URLs
    - web_search(query="...") to search the web
    - bash(command="...") to run commands
    - delegate(agent_name="...", task="...") to delegate to sub-agents (@coder, @researcher)
    - memory(action="save_fact", query="...", category="...") to remember personal info
    - memory(action="recall_fact", query="...") to search your memory
    
    For weather: use web_fetch with url="https://wttr.in/[CITY]?format=3"

api_keys:
  # Set via environment variables if needed:
  # ANTHROPIC_API_KEY
  # OPENAI_API_KEY
  # OLLAMA_HOST (optional, for custom endpoint)
