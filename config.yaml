model:
  # provider options: anthropic, openai, ollama
  provider: ollama
  name: qwen3:4b  # or codellama, mistral, etc.
  # For ollama, optionally specify base_url (default: http://localhost:11434)
  base_url: http://localhost:11434
  temperature: 0.1  # Low temperature for strict JSON tool calling

tools:
  enabled:
    - bash
    - read_file
    - write_file
    - list_dir
    - glob
    - grep
    - web_fetch
    - web_search
    - git
    - memory
    - notes
  bash:
    allowed_commands:
      - git
      - npm
      - cargo
      - make
      - ls
      - cat
      - echo
      - grep
      - find
      - python
      - python3
      - node
    timeout: 60

safety:
  workspace: "/home/barontek"
  allow_network: true
  allowed_domains: []
  blocked_commands:
    - "rm -rf /"
    - "dd if="
    - "mkfs"
    - ":(){:|:&};:"
    - "curl.*|.*sh"
    - "wget.*|.*sh"
    - "nc -e"
    - "/bin/sh -i"
    - "/bin/bash -i"
  max_file_size: 10485760
  max_execution_time: 60
  require_approval_for:
    - bash
    - write_file

agent:
  max_iterations: 50
  max_context_messages: 50  # Max messages to keep in context (0 = unlimited)
  max_context_chars: 100000  # Max characters in context (0 = unlimited)
  
  # Sub-agents configuration
  sub_agents:
    devops:
      description: "DevOps engineer for system administration, git operations, and running commands"
      model: "qwen3:4b"
      tools: ["bash", "git", "read_file", "write_file"]
    researcher:
      description: "Research assistant for web searches and fetching information"
      model: "qwen3:4b"
      tools: ["web_search", "web_fetch"]
    secretary:
      description: "Personal secretary for managing notes and remembering personal information"
      model: "qwen3:4b"
      tools: ["memory", "notes"]
  
  system_prompt: |
    You are a LOCAL AI assistant running with Ollama. You MUST strictly use the provided JSON tool formats to interact with the system. Do not write raw markdown if a tool call is required.
    
    When someone says hi/hello, just say hi back warmly! Keep responses brief.
    
    IMPORTANT: You fully support UTF-8. Handle all Unicode characters including Turkish (ş, ç, ı, ö, ü, ğ), German (ü, ö, ä), etc. correctly.
    
    TOOL CALLING RULES:
    - ALWAYS use tools when the user asks for specific actions
    - NEVER guess information - use tools to verify
    - Use delegate(agent_name="...", task="...") to delegate to sub-agents
    
    AVAILABLE TOOLS:
    - list_dir(path=".") - list files in directory
    - read_file(path="...") - read file contents  
    - write_file(path="...", content="...") - write to file
    - web_fetch(url="...") - fetch URL content
    - web_search(query="...") - search the web
    - bash(command="...") - run shell commands
    - memory(action="save_fact", query="...") - remember info
    - memory(action="recall_fact", query="...") - recall info
    - notes(action="create_note", filename="...", content="...") - create note
    - notes(action="read_note", filename="...") - read note
    - notes(action="append_to_note", filename="...", content="...") - add to note
    - notes(action="search_notes", query="...") - search notes
    - notes(action="list_notes") - list all notes
    
    For weather: use web_fetch with url="https://wttr.in/[CITY]?format=3"

api_keys:
  # Set via environment variables if needed:
  # ANTHROPIC_API_KEY
  # OPENAI_API_KEY
  # OLLAMA_HOST (optional, for custom endpoint)
