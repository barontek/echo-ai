model:
  # provider options: anthropic, openai, ollama
  provider: ollama
  name: gemma4:e4b  # Default model - best for following instructions and tool calling
  # For ollama, optionally specify base_url (default: http://localhost:11434)
  base_url: http://localhost:11434
  temperature: 0.1  # Low temperature for strict JSON tool calling
  timeout: 60  # HTTP timeout in seconds (default: 60)
  num_ctx: 32768  # Context window size for Ollama

tools:
  enabled:
    - bash
    - read_file
    - write_file
    - list_dir
    - glob
    - grep
    - web_fetch
    - web_search
    - git
    - memory
    - notes
    - humanizer
    - deep_search
  bash:
    allowed_commands:
      - git
      - npm
      - cargo
      - make
      - ls
      - cat
      - echo
      - grep
      - find
      - python
      - python3
      - node
      - cd
      - pwd
      - mkdir
      - rm
      - cp
      - mv
      - pip
      - docker
      - pytest
      - uv
      - date
    timeout: 60

  web_search:
    provider: "brave"  # Options: "duckduckgo", "tavily", "brave"
    # Tavily requires TAVILY_API_KEY env variable
    # Brave requires BRAVE_SEARCH_API_KEY env variable

  web_fetch: {}

safety:
  workspace: "."  # Set via ECHO_WORKSPACE environment variable
  allow_network: true
  enable_domain_allowlist: false  # Set to true to restrict to allowed_domains only
  allowed_domains:
    - "github.com"
    - "*.github.com"
    - "stackoverflow.com"
    - "pypi.org"
    - "docs.python.org"
    - "npmjs.com"
  blocked_commands:
    - "rm -rf /"
    - "dd if="
    - "mkfs"
    - ":(){:|:&};:"
    - "curl.*sh"
    - "wget.*sh"
    - "nc -e"
    - "/bin/sh -i"
    - "/bin/bash -i"
  max_file_size: 10485760
  max_execution_time: 60
  require_approval_for:
    #- bash
    #- write_file
   # - memory
  # New security options
  audit_log_path: "echo-ai-audit.log"
  read_requires_approval: false
  read_size_threshold: 102400

agent:
  max_iterations: 50
  max_context_messages: 50  # Max messages to keep in context (0 = unlimited)
  max_context_chars: 100000  # Max characters in context (0 = unlimited)
  token_reserve_ratio: 0.7  # Keep 70% of context for content, 30% for response
  system_prompt: |
    You are Echo AI, a precise, tool-executing general-purpose assistant. Execute operations accurately on behalf of the user using the tools provided.

    ━━━ EXECUTION ━━━

    Always use native function tools for actions and lookups. Never guess, infer, or hallucinate results.

    On tool failure or empty result:
    1. Report what failed and why (if known)
    2. Propose an alternative or ask for clarification
    3. Never proceed as if the call succeeded

    ━━━ REASONING ━━━

    Before every tool call or non-trivial response, emit a <think> block.
    Structure: what is being asked → what tool/approach is needed → expected output.
    Keep it brief. This is internal scaffolding, not part of the response.

    ━━━ OUTPUT ━━━

    - Answer directly. No preamble, no filler.
    - Synthesize tool results into clean prose. No raw URLs or file dumps.
    - Do not summarize tool outputs with a single sentence. Extract and provide the actual data, facts, and details relevant to the query.
    - When tool output contains a numbered list, address every item — do not stop after the first.
    - No emojis.
    - Match the user's language. Default to English when ambiguous.

    ━━━ DELEGATION ━━━

    Use delegate(agent_name="...", task="...") only when:
    - The task domain is outside your own tool set, OR
    - The user explicitly names a sub-agent.

    Never delegate what you can handle directly.

    ━━━ MEMORY ━━━

    Memories are pre-injected into your context at session start — use them directly without calling any tool.
    Call recall_fact(query=...) only when searching for something not covered by the injected context.
    Call save_fact(query=..., category=...) when the user explicitly asks, or when a fact is clearly worth retaining long-term. Tag with the most specific category: 'personal', 'preference', 'fact', etc.
    Before calling delete_fact or clear_facts, always warn the user what will be removed.
    Never surface memory unprompted in unrelated responses.

    ━━━ FILES & CODE ━━━

    Confirm target path before reading or writing any file.
    State what code will do before executing it.
    On unexpected output, report it as-is — never interpret away errors.

    ━━━ WEB SEARCH ━━━

    Query format:
    - Wrap main subject in quotes: "Turkey" economy June 2026
    - Always include year + month
    - Add a specific angle: politics / economy / technical / legal / etc.
    - Never use "latest" or "recent" — use the actual date
    - Max 8 words per query

    Run multiple focused queries rather than one broad query when full coverage matters.


# Limits for various operations
limits:
  # Web content limits
  max_web_fetch_chars: 15000  # Max characters when fetching web pages
  max_search_results: 20  # Max results per search query
  max_search_result_snippet: 20000  # Max chars per result snippet
  min_fetch_content_chars: 50  # Minimum content to consider fetch successful
  search_result_truncate: 5000  # Truncate search results to this many chars

  # File search limits
  max_glob_results: 100  # Max files returned by glob
  max_grep_results: 100  # Max grep matches per file
  max_search_query_length: 500  # Max length of search queries

  # File operation limits
  max_file_read_size: 10485760  # 10MB - max file size to read
  max_file_write_size: 5242880  # 5MB - max file size to write

  # API limits
  max_sessions_per_page: 50  # Default pagination size for sessions
  max_sessions_total: 1000  # Max sessions to list without pagination

  # Sub-agents configuration
  sub_agents:
    devops:
      description: "DevOps engineer for system administration, git operations, and running commands"
      model: "qwen3:4b-instruct"
      tools: ["bash", "git", "read_file", "write_file"]
    researcher:
      description: "Research assistant for web searches and fetching information"
      model: "qwen3:4b-instruct"
      tools: ["web_search", "web_fetch"]
    secretary:
      description: "Personal secretary for managing notes and remembering personal information"
      model: "qwen3:4b-instruct"
      tools: ["memory", "notes"]

# api_keys:
#   # Set via environment variables if needed:
#   # ANTHROPIC_API_KEY
#   # OPENAI_API_KEY

observability:
  otel_enabled: false
  console_export: false
  otlp_endpoint: "http://localhost:4317"
  service_name: "echo-ai"

web:
  cors_origins:
    - "http://localhost:3000"
    - "http://localhost:8000"
  cors_allow_credentials: true
  cors_allow_methods:
    - "*"
  cors_allow_headers:
    - "*"
  host: "0.0.0.0"
  port: 8080
  rate_limit:
    requests: 60  # requests per window
    window_seconds: 60
