model:
  # provider options: anthropic, openai, ollama
  provider: ollama
  name: qwen3:4b-instruct  # Default model - best for following instructions and tool calling
  # For ollama, optionally specify base_url (default: http://localhost:11434)
  base_url: http://localhost:11434
  temperature: 0.1  # Low temperature for strict JSON tool calling

tools:
  enabled:
    - bash
    - read_file
    - write_file
    - list_dir
    - glob
    - grep
    - web_fetch
    - web_search
    - git
    - memory
    - notes
  bash:
    allowed_commands:
      - git
      - npm
      - cargo
      - make
      - ls
      - cat
      - echo
      - grep
      - find
      - python
      - python3
      - node
      - cd
      - pwd
      - mkdir
      - rm
      - cp
      - mv
      - pip
      - docker
      - curl
      - wget
      - ssh
      - pytest
      - uv
      - date
    timeout: 60

safety:
  workspace: "/home/barontek"
  allow_network: true
  allowed_domains:
    - "github.com"
    - "*.github.com"
    - "stackoverflow.com"
    - "pypi.org"
    - "docs.python.org"
    - "npmjs.com"
  blocked_commands:
    - "rm -rf /"
    - "dd if="
    - "mkfs"
    - ":(){:|:&};:"
    - "curl.*sh"
    - "wget.*sh"
    - "nc -e"
    - "/bin/sh -i"
    - "/bin/bash -i"
  max_file_size: 10485760
  max_execution_time: 60
  require_approval_for:
    - bash
    - write_file
    - memory
  # New security options
  audit_log_path: "echo-ai-audit.log"
  read_requires_approval: false
  read_size_threshold: 102400

agent:
  max_iterations: 50
  max_context_messages: 50  # Max messages to keep in context (0 = unlimited)
  max_context_chars: 100000  # Max characters in context (0 = unlimited)

  # Sub-agents configuration
  sub_agents:
    devops:
      description: "DevOps engineer for system administration, git operations, and running commands"
      model: "qwen3:4b-instruct"
      tools: ["bash", "git", "read_file", "write_file"]
    researcher:
      description: "Research assistant for web searches and fetching information"
      model: "qwen3:4b-instruct"
      tools: ["web_search", "web_fetch"]
    secretary:
      description: "Personal secretary for managing notes and remembering personal information"
      model: "qwen3:4b-instruct"
      tools: ["memory", "notes"]

  system_prompt: |
    You are Echo AI, an autonomous enterprise reasoning agent. Your primary directive is to execute operations accurately and safely on behalf of the user.

    CORE PRINCIPLES:
    1. Tool Execution: You operate within a highly capable tool-calling environment. When asked to perform an action, ALWAYS use the provided native function tools. DO NOT GUESS or hallucinate results.
    2. Precision: Provide the actual information/answers directly and concisely. Avoid unnecessary conversational preamble.
    3. Delegation: Use the delegate(agent_name="...", task="...") tool to offload specialized work to domain sub-agents when necessary.
    4. Reasoning: If a task requires complex logic, emit `<think>` blocks to structure your thoughts BEFORE calling tools or generating a final response. Outline your execution steps internally to ensure correctness.
    5. Summarization: When tool results are present in your context history, synthesize them into a clean, readable final text response. Do not raw-dump URLs or file outputs.

    IMPORTANT: You fully support UTF-8. Handle all Unicode characters (e.g. ş, ç, ı, ö, ü, ğ) correctly.

# api_keys:
#   # Set via environment variables if needed:
#   # ANTHROPIC_API_KEY
#   # OPENAI_API_KEY

observability:
  otel_enabled: false
  console_export: false
  otlp_endpoint: "http://localhost:4317"
  service_name: "echo-ai"
