model:
  # provider options: anthropic, openai, ollama
  provider: ollama
  name: gemma4:e4b  # Default model - best for following instructions and tool calling
  # For ollama, optionally specify base_url (default: http://localhost:11434)
  base_url: http://localhost:11434
  temperature: 0.1  # Low temperature for strict JSON tool calling
  timeout: 60  # HTTP timeout in seconds (default: 60)
  num_ctx: 8192  # Context window size for Ollama (default: 2048, model max: 262144)

tools:
  enabled:
    - bash
    - read_file
    - write_file
    - list_dir
    - glob
    - grep
    - web_fetch
    - web_search
    - git
    - memory
    - notes
    - humanizer
  bash:
    allowed_commands:
      - git
      - npm
      - cargo
      - make
      - ls
      - cat
      - echo
      - grep
      - find
      - python
      - python3
      - node
      - cd
      - pwd
      - mkdir
      - rm
      - cp
      - mv
      - pip
      - docker
      - pytest
      - uv
      - date
    timeout: 60

  web_search:
    provider: "tavily"  # Options: "duckduckgo", "tavily"
    # Tavily requires TAVILY_API_KEY env variable

  web_fetch: {}

safety:
  workspace: "."  # Set via ECHO_WORKSPACE environment variable
  allow_network: true
  enable_domain_allowlist: false  # Set to true to restrict to allowed_domains only
  allowed_domains:
    - "github.com"
    - "*.github.com"
    - "stackoverflow.com"
    - "pypi.org"
    - "docs.python.org"
    - "npmjs.com"
  blocked_commands:
    - "rm -rf /"
    - "dd if="
    - "mkfs"
    - ":(){:|:&};:"
    - "curl.*sh"
    - "wget.*sh"
    - "nc -e"
    - "/bin/sh -i"
    - "/bin/bash -i"
  max_file_size: 10485760
  max_execution_time: 60
  require_approval_for:
    #- bash
    #- write_file
   # - memory
  # New security options
  audit_log_path: "echo-ai-audit.log"
  read_requires_approval: false
  read_size_threshold: 102400

agent:
  max_iterations: 50
  max_context_messages: 50  # Max messages to keep in context (0 = unlimited)
  max_context_chars: 100000  # Max characters in context (0 = unlimited)
  token_reserve_ratio: 0.7  # Keep 70% of context for content, 30% for response
  system_prompt: |
    You are Echo AI, an autonomous reasoning agent. Your primary directive is to execute operations accurately and safely on behalf of the user.

    CORE PRINCIPLES:
    1. Tool Execution: You operate within a highly capable tool-calling environment. When asked to perform an action, ALWAYS use the provided native function tools. DO NOT GUESS or hallucinate results.
    2. Precision: Provide the actual information/answers directly and concisely. Avoid unnecessary conversational preamble.
    3. Delegation: Use the delegate(agent_name="...", task="...") tool to offload specialized work to domain sub-agents when necessary.
    4. Reasoning: If a task requires complex logic, emit `<think>` blocks to structure your thoughts BEFORE calling tools or generating a final response. Outline your execution steps internally to ensure correctness.
    5. Summarization: When tool results are present in your context history, synthesize them into a clean, readable final text response. Do not raw-dump URLs or file outputs.
    6. No emojis: Do not use any emojis in your responses.
    7. No unnecessary personnalisation: You don't have to use ALL the information in the persistent memory when responding. Use them if necessary

    IMPORTANT: You fully support UTF-8. Handle all Unicode characters (e.g. ş, ç, ı, ö, ü, ğ) correctly.


# Limits for various operations
limits:
  # Web content limits
  max_web_fetch_chars: 15000  # Max characters when fetching web pages
  max_search_result_snippet: 500  # Max chars in search result snippets
  min_fetch_content_chars: 50  # Minimum content to consider fetch successful
  search_result_truncate: 1000  # Truncate search results to this many chars

  # File search limits
  max_glob_results: 100  # Max files returned by glob
  max_grep_results: 100  # Max grep matches per file
  max_search_query_length: 500  # Max length of search queries

  # File operation limits
  max_file_read_size: 10485760  # 10MB - max file size to read
  max_file_write_size: 5242880  # 5MB - max file size to write

  # API limits
  max_sessions_per_page: 50  # Default pagination size for sessions
  max_sessions_total: 1000  # Max sessions to list without pagination

  # Sub-agents configuration
  sub_agents:
    devops:
      description: "DevOps engineer for system administration, git operations, and running commands"
      model: "qwen3:4b-instruct"
      tools: ["bash", "git", "read_file", "write_file"]
    researcher:
      description: "Research assistant for web searches and fetching information"
      model: "qwen3:4b-instruct"
      tools: ["web_search", "web_fetch"]
    secretary:
      description: "Personal secretary for managing notes and remembering personal information"
      model: "qwen3:4b-instruct"
      tools: ["memory", "notes"]

# api_keys:
#   # Set via environment variables if needed:
#   # ANTHROPIC_API_KEY
#   # OPENAI_API_KEY

observability:
  otel_enabled: false
  console_export: false
  otlp_endpoint: "http://localhost:4317"
  service_name: "echo-ai"

web:
  cors_origins:
    - "http://localhost:3000"
    - "http://localhost:8000"
  cors_allow_credentials: true
  cors_allow_methods:
    - "*"
  cors_allow_headers:
    - "*"
  host: "0.0.0.0"
  port: 8080
  rate_limit:
    requests: 60  # requests per window
    window_seconds: 60
