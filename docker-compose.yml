version: '3.8'

services:
  api:
    build: .
    command: python scripts/run_api.py --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - .agent_sessions:/app/.agent_sessions
      - .chroma_db:/app/.chroma_db
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}

  web:
    build: .
    command: streamlit run scripts/run_web.py --server.address 0.0.0.0 --server.port 8501
    ports:
      - "8501:8501"
    depends_on:
      - api
    volumes:
      - .agent_sessions:/app/.agent_sessions
      - .chroma_db:/app/.chroma_db
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
