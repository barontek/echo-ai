services:
  echo-ai:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./sessions:/app/.agent_sessions
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    restart: unless-stopped
