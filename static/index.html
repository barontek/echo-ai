<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Echo AI - An intelligent agent framework with tool calling capabilities">
    <meta name="theme-color" content="#0e1117">
    <title>Echo AI</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-python.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-bash.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-javascript.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-json.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-yaml.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-markdown.min.js"></script>
    <link rel="stylesheet" href="/static/css/style.css?v=7">
</head>
<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <div id="connection-banner" class="connection-banner" role="alert" aria-live="assertive" style="display: none;"></div>
    <div class="app">
        <aside id="sidebar" class="sidebar" aria-label="Application sidebar">
            <div class="sidebar-header">
                <h1>Echo AI</h1>
            </div>

            <div class="sidebar-section">
                <h2 id="model-label">Model</h2>
                <select id="model-select" aria-labelledby="model-label">
                    <option value="ollama">Ollama</option>
                </select>
                <label for="ollama-model" class="visually-hidden">Select model</label>
                <select id="ollama-model" aria-label="Select AI model"></select>
            </div>

            <div class="sidebar-section">
                <h2 id="sessions-label">Sessions</h2>
                <label for="session-search" class="visually-hidden">Search sessions</label>
                <input id="session-search" type="search" placeholder="Search sessions" aria-label="Search sessions">
                <button id="new-chat-btn" class="btn btn-primary" type="button">+ New Chat</button>
                <button id="open-workflows-btn" class="btn" type="button">Open Workflows Window</button>
                <div class="session-actions" role="group" aria-label="Session actions">
                    <button id="rename-session-btn" class="btn" type="button">Rename</button>
                    <button id="delete-session-btn" class="btn btn-danger" type="button">Delete</button>
                </div>
                <div id="session-list" class="session-list" role="listbox" aria-label="Session list" aria-activedescendant=""></div>
                <button id="purge-sessions-btn" class="btn btn-danger btn-small" type="button" style="margin-top: 10px; width: 100%;">Purge History</button>
            </div>

            <div class="sidebar-footer">
                <div class="theme-toggle" role="group" aria-label="Theme toggle">
                    <input type="checkbox" id="theme-toggle" checked aria-label="Toggle dark mode">
                    <span>Dark Mode</span>
                </div>
            </div>
        </aside>

        <main id="main-content" class="main" tabindex="-1">
            <header class="chat-header">
                <button id="sidebar-toggle" class="btn sidebar-toggle" type="button" aria-controls="sidebar" aria-expanded="false">☰ Menu</button>
                <div class="header-info" aria-live="polite">
                    <span id="model-badge">Model: qwen3:4b-instruct</span>
                    <span id="metrics-badge" aria-live="polite">Messages: 0</span>
                </div>
            </header>

            <div id="chat-container" class="chat-container" role="log" aria-label="Chat messages" aria-live="polite" tabindex="0"></div>

            <div class="chat-input-container">
                <form id="chat-form" role="search">
                    <label for="chat-input" class="visually-hidden">Type your message</label>
                    <input type="text" id="chat-input" placeholder="Type your message..." autocomplete="off" aria-label="Message input">
                    <button type="submit" id="send-btn" class="btn btn-primary" aria-label="Send message">Send</button>
                    <button type="button" id="stop-btn" class="btn btn-danger" style="display: none;" aria-label="Stop generation">Stop</button>
                </form>
            </div>
        </main>
    </div>

    <div id="sr-announcer" class="visually-hidden" aria-live="polite" aria-atomic="true"></div>

    <script type="module" src="/static/js/main.js"></script>
</body>
</html>
